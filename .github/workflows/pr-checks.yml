name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.3"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  ios-simulator-preview:
    name: iOS Simulator Preview
    needs: lint-and-test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.3"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build iOS simulator app
        run: flutter build ios --simulator --no-codesign

      - name: Zip simulator build
        run: |
          cd build/ios/iphonesimulator
          zip -r -q Runner.app.zip Runner.app

      - name: Upload to Appetize.io
        id: appetize
        run: |
          RESPONSE=$(curl -sS -X POST https://api.appetize.io/v1/apps \
            -H "X-API-KEY: ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@build/ios/iphonesimulator/Runner.app.zip" \
            -F "platform=ios" \
            -F "note=${{ github.event.pull_request.head.sha }}")
          PUBLIC_KEY=$(echo "$RESPONSE" | jq -r '.publicKey')
          APP_URL=$(echo "$RESPONSE" | jq -r '.appUrl')
          if [ "$PUBLIC_KEY" = "null" ] || [ -z "$PUBLIC_KEY" ]; then
            echo "::error::Appetize upload failed: $RESPONSE"
            exit 1
          fi
          echo "public_key=$PUBLIC_KEY" >> "$GITHUB_OUTPUT"
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Upload iOS simulator build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/iphonesimulator/Runner.app.zip
          retention-days: 14

      - name: Comment on PR
        if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          APPETIZE_PUBLIC_KEY: ${{ steps.appetize.outputs.public_key }}
          APPETIZE_APP_URL: ${{ steps.appetize.outputs.app_url }}
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;
            const appetizeKey = process.env.APPETIZE_PUBLIC_KEY;
            const appetizeUrl = process.env.APPETIZE_APP_URL || (appetizeKey ? `https://appetize.io/app/${appetizeKey}` : '');

            const previewSection = appetizeUrl
              ? [
                  '',
                  `### 📱 [Launch Interactive Preview](${appetizeUrl})`,
                  '',
                  `> Click the link above to run this build in a browser-based iOS simulator`,
                ]
              : [
                  '',
                  '> ⚠️ Appetize preview unavailable — check the workflow logs for details.',
                ];

            const body = [
              `## ${emoji} iOS Simulator Preview`,
              '',
              '| Detail | Value |',
              '|--------|-------|',
              `| **Status** | ${status} |`,
              `| **Flutter** | 3.41.3 |`,
              `| **Runner** | macos-15 |`,
              `| **Commit** | \`${context.sha.substring(0, 7)}\` |`,
              ...previewSection,
              '',
              `📦 [Download build artifact](${artifactUrl})`,
              '',
              `🔗 [View full workflow run](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('iOS Simulator Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
