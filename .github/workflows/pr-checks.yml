name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.3"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  ios-simulator-preview:
    name: iOS Simulator Preview
    needs: lint-and-test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.3"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build iOS simulator app
        run: flutter build ios --simulator --no-codesign

      - name: Boot iOS simulator
        uses: futureware-tech/simulator-action@dab10d813144ef59b48d401cd95da151222ef8cd # v4
        with:
          model: "iPhone 16"

      - name: Install app on simulator
        run: xcrun simctl install booted build/ios/iphonesimulator/Runner.app

      - name: Launch app and capture screenshot
        run: |
          xcrun simctl launch booted com.timdavis.animeWatchlist
          sleep 15
          xcrun simctl io booted screenshot simulator-screenshot.png

      - name: Upload simulator screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshot
          path: simulator-screenshot.png
          retention-days: 14

      - name: Upload iOS simulator build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/iphonesimulator/Runner.app
          retention-days: 14

      - name: Comment on PR
        if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;

            const body = [
              `## ${emoji} iOS Simulator Preview`,
              '',
              '| Detail | Value |',
              '|--------|-------|',
              `| **Status** | ${status} |`,
              `| **Flutter** | 3.41.3 |`,
              `| **Runner** | macos-15 |`,
              `| **Simulator** | iPhone 16 |`,
              `| **Commit** | \`${context.sha.substring(0, 7)}\` |`,
              '',
              `📸 [View screenshot & download build](${artifactUrl})`,
              '',
              `🔗 [View full workflow run](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('iOS Simulator Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
